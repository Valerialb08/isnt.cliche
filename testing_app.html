<!DOCTYPE html>
<html lang="en">
<head>

    <!-- GOOGLE FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <title>Crochet Store</title>

<style>
body {
    margin: 0;
    font-family: "Instrument Sans", sans-serif;
}

/* HERO SECTION */
.hero {
    height: 100vh;
    background-image: url("Images/tote_bag.JPG");
    background-size: cover;
    background-position: center 30%;
    position: relative;
    color: white;
}

.contacts-section {
    background: rgb(15, 15, 15);
    height: 140px;
    padding: 40px 20px 50px;
    color: white;
    margin: 0;
    text-align: center;
}

.icon {
    width: 22px;
    height: 22px;
    fill: #ffffff; /* your orange */
    flex-shrink: 0; /* prevents squishing */
    transition: 0.3s;
}

.contacts-section h2 {
    margin-top: 0;   /* removes gap above */
    margin-bottom: 40px;
}

.contact-item:hover .icon {
    color: white;
}

.contact-line {
    height: 2px;
    background: white;
    width: 90%;
    margin: 20px auto;
    opacity: 0.5;
}

.contact-items {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-top: 30px;
}

.contact-item {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* SIDE PANEL */
.side-panel {
    position: fixed;
    top: 0px;
    left: -250px;
    width: 250px;
    height: 100%;
    background: white;
    box-shadow: 2px 0 10px rgba(0,0,0,0.2);
    transition: left 0.3s ease;
    z-index: 1500;
    padding-top: 4%;
    
}



.side-panel h2 {
    margin-top: 40px; /* decrease this value */
    padding-left: 25px;
}


.side-panel.open {
    left: 0;
}

.menu-link {
    display: block;
    margin: 15px 0;
    color: rgb(165, 165, 165);
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
    font-family:"Instrument Sans", sans-serif;
    padding-left: 10%;
}

.menu-link:hover {
    color: rgb(126, 126, 126);
    font-weight: 700;
}

/* MENU BUTTON */
.menu-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 24px;
    background: rgba(255, 255, 255, 0.3);
    border: none;
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    z-index: 2000;
    color:rgba(255, 255, 255, 0.644);
    transition: all 0.3s ease;
}

.menu-btn:hover {
    transform: scale(1.1);
    opacity: 0.7;
}

.menu-btn.active {
    background: rgb(255, 255, 255);
    color: #2b2b2b;
}

.side-panel.open ~ .hero .menu-btn {
    color: black;
    background-color: #2b2b2b00;
}
/* TOP SEARCH BAR */
.top-bar {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
}

.search-box {
    display: flex;
    align-items: center;
    padding-bottom: 4px;
    padding-top: 4px;
    padding-left: 14px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    position:relative;
    transition: all 0.3s ease; /* IMPORTANT */
    
}.search-box:hover {
    background: rgba(255, 255, 255, 0.3);
}

.search-box:focus-within {
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.219);
    background: rgba(255, 255, 255, 0.35);
}


.search-box input {
    border: none;
    outline: none;
    flex: 1;
    padding: 8px;
    background: transparent;
    color: white;
    font-family: "Instrument Sans", sans-serif;
    letter-spacing: 0.5px;
    
}

.clear-btn {
    position: absolute;
    right: 15px;   /* controls how far from the edge */
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: white;
    font-size: 18px;
}

.search-box input::placeholder {
    color: rgba(255,255,255,0.7);
}

/* CATEGORY BUTTONS */
.categories {
    margin-top: 20px;
    text-align: center;
    color: blanchedalmond;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
}

.categories button {
    margin: 8px;
    padding: 8px 14px;
    border: none;
    border-radius: 8px;
    background: white;
    cursor: pointer;
    font-family: "Instrument Sans", sans-serif;
    font-weight: 500;
    color: #54858f;
    text-transform: uppercase;
}

.categories button:hover {
    color: rgb(255, 123, 0);
    transform: translateY(-2px);
}

/* CENTER TEXT */
.center-text {
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    font-weight: bold;
    text-align: center;
    pointer-events: none;
}

.logo {
    width: 1000px;
    fill: white;
    border: 2px red;
    display: block;
    padding-top: 30%;
}



/* CTA BUTTON */
.cta {
    position: absolute;
    bottom: 20%;
    left: 50%;
    transform: translateX(-50%);
    margin-bottom: 0;
}

.catalog-btn {
    display: block;
    text-align: center;

    padding: 20px 40px;
    font-size: 20px;

    background: #f68b4d;
    color: white;
    font-weight: 500;
    text-decoration: none; /* removes underline */

    border-radius: 40px;
    transition: all 0.3s ease;
}

.catalog-btn:hover {
    background: #f68b4d;
    transform: translateY(-2px);
    box-shadow: 2px 2px 10px rgba(36, 36, 36, 0.5);
}

.catalog-btn:active {
    transform: translateY(0);
}

.catalog-btn:focus {
    outline: none;
    border: 1px solid #ffffff;
    box-shadow: 0 0 10px rgba(255, 123, 0, 0.5);
}

.cta button:hover {
    background: #e0773d;
}
</style>

</head>
